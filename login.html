<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Jetseen</title>
  <meta name="description" content="Log in to Jetseen to track your travel compliance.">
  <link rel="icon" href="/default-favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <div id="navbar"></div>

  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md fade-in">
      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2 mb-4">
          <svg class="w-10 h-10 text-blue-600" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
            <path d="M8 16c0-4.4 3.6-8 8-8M16 24c4.4 0 8-3.6 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M10 12l6 4-6 4V12z" fill="currentColor"/>
          </svg>
        </a>
        <h1 class="text-2xl font-bold text-slate-900">Welcome back</h1>
        <p class="text-slate-500 mt-2">Log in to your Jetseen account</p>
      </div>

      <!-- Form Card -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
        <form id="login-form" class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
            <input type="email" id="email" required placeholder="you@example.com"
              class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
            <input type="password" id="password" required placeholder="Enter your password"
              class="w-full px-4 py-3 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
          </div>

          <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3"></div>

          <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors duration-200 text-sm">
            Log In
          </button>
        </form>
      </div>

      <p class="text-center text-sm text-slate-500 mt-6">
        Don't have an account? <a href="signup.html" class="text-blue-600 hover:text-blue-700 font-medium">Sign up</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>
  <script src="components.js"></script>
  <script>
    // Redirect if already logged in
    if (auth.isAuthenticated()) {
      window.location.href = '/app.html';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');

      errorEl.classList.add('hidden');

      const result = auth.login(email, password);
      if (result.success) {
        window.location.href = '/app.html';
      } else {
        errorEl.textContent = result.error;
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
